<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>מצב חירום</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #faf3e8; font-family: Arial, sans-serif; }
    body { display: grid; place-items: center; overflow: hidden; }
    .phone {
      position: relative;
      width: min(100vw, 56.25vh);
      height: min(177.78vw, 100vh);
      max-width: 1080px;
      max-height: 1920px;
      background: #faf3e8;
      overflow: hidden;
    }
    .bg { width: 100%; height: 100%; display: block; object-fit: contain; }
    .hotspot {
      position: absolute;
      border: 0;
      background: rgba(255,255,255,0);
      cursor: pointer;
      border-radius: 8%;
      -webkit-tap-highlight-color: transparent;
      transition: transform .16s ease, filter .16s ease;
    }
    .hotspot:hover { transform: scale(1.025); }
    .hotspot:active { transform: scale(.965); }
    .presentation { left: 6.3%; top: 35.9%; width: 40.5%; height: 22.6%; }
    .video        { left: 51.2%; top: 35.9%; width: 40.5%; height: 22.6%; }
    .sheet        { left: 6.3%; top: 61.9%; width: 40.5%; height: 22.3%; }
    .job          { left: 51.2%; top: 61.9%; width: 40.5%; height: 22.3%; }
    .siren-pulse {
      position: absolute;
      left: 77.4%; top: 6.2%; width: 12%; height: 8%;
      border-radius: 50%;
      pointer-events: none;
      animation: siren 1.8s infinite ease-in-out;
      background: radial-gradient(circle, rgba(255,0,0,.28), rgba(255,0,0,0) 68%);
      mix-blend-mode: multiply;
    }
    .heart-pulse {
      position: absolute;
      left: 26%; top: 88.2%; width: 9%; height: 5%;
      border-radius: 50%;
      pointer-events: none;
      animation: heart 2.4s infinite ease-in-out;
      background: radial-gradient(circle, rgba(216,61,126,.22), rgba(216,61,126,0) 70%);
    }
    @keyframes siren { 0%,100% { opacity:.15; transform:scale(.85);} 50% { opacity:1; transform:scale(1.18);} }
    @keyframes heart { 0%,100% { opacity:.15; transform:scale(.9);} 50% { opacity:.75; transform:scale(1.12);} }
    .modal {
      position: absolute; inset: 0; display: none; place-items: center;
      background: rgba(250,243,232,.42); backdrop-filter: blur(2px);
      z-index: 5;
    }
    .modal.show { display: grid; }
    .box {
      width: 78%; max-width: 420px; background: rgba(255,255,255,.96);
      border-radius: 24px; padding: 24px 18px; text-align: center;
      color: #092b61; box-shadow: 0 18px 45px rgba(0,0,0,.18);
      animation: pop .25s ease-out;
      font-weight: 700; font-size: clamp(18px, 5vw, 34px); line-height: 1.45;
    }
    .box .icon { font-size: 40px; display: block; margin-bottom: 8px; }
    @keyframes pop { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <main class="phone" aria-label="מצב חירום">
    <img class="bg" src="background.png" alt="מצב חירום - דף כפתורים" />
    <div class="siren-pulse"></div>
    <div class="heart-pulse"></div>

    <button class="hotspot presentation" aria-label="הכנת מצגת" data-type="presentation"></button>
    <button class="hotspot video" aria-label="הכנת סרטון" data-type="video"></button>
    <button class="hotspot sheet" aria-label="הכנת גיליון נתונים" data-type="sheet"></button>
    <button class="hotspot job" aria-label="בואי למשרה" data-type="job"></button>

    <div class="modal" id="modal">
      <div class="box" id="box"><span class="icon">🚨</span><span id="status">מאתרת את ימית...</span></div>
    </div>
  </main>

  <script>
    const PHONE = "9725XXXXXXXX"; // להחליף למספר הוואטסאפ בלי 0 בהתחלה, למשל 972541234567

    const messages = {
      presentation: "מצב חירום! צריכה הכנת מצגת 😊",
      video: "מצב חירום! צריכה הכנת סרטון 🎬",
      sheet: "מצב חירום! צריכה עזרה בגיליון נתונים 📊",
      job: "אין ברירה... בואי למשרה ❤️"
    };

    const modal = document.getElementById('modal');
    const statusText = document.getElementById('status');

    document.querySelectorAll('.hotspot').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        const text = messages[type];
        modal.classList.add('show');
        statusText.textContent = 'מאתרת את ימית...';
        setTimeout(() => { statusText.textContent = 'פותחת ערוץ וואטסאפ...'; }, 650);
        setTimeout(() => {
          const url = `https://wa.me/${PHONE}?text=${encodeURIComponent(text)}`;
          window.location.href = url;
        }, 1250);
      });
    });
  </script>
</body>
</html>
